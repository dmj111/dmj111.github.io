<html>
  <body>
    <p>
      Use this page to force chrome to load a page over HTTP to sign into
      public wifi with captive portals.
    <p>
      <a id='example_link' href='http://example.com'> Click here </a>
      if the page does not automatically load, 
    <script>
      var a = document.getElementById('example_link');
      var date = Date.now();
      a.href = "http://example.com/?q=" + encodeURIComponent(date);
      // window.location.href = a.href;
  </script>
  </body>
</html>
