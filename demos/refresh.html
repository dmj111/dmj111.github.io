<html>
  <head>
  </head>
  <body>
    Use this page to force a page load over http so chrome can take
    you to captive portals in public wifi.  Click the link to get a
    fresh page from cache.
    <div id='linkdiv'></div>
  </body>
  <script>
    var linkdiv = document.getElementById('linkdiv');
    var a = document.createElement('a');
    var date = Date.now();
    var linkText = document.createTextNode('click to refresh : ' + date);
    a.appendChild(linkText);
    a.href = "refresh.html?q=" + encodeURIComponent(date);
    linkdiv.appendChild(a);
  </script>
</html>
