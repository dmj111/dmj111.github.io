<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="author" content="Dave Jones">

        <title>tic-tac-toe</title>
        <link href="/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css">
        <link href="/assets/css/theme.css" rel="stylesheet" type="text/css">
        <link href="/assets/css/custom.css" rel="stylesheet" type="text/css">
        <link rel='stylesheet' href='tictactoe.css' type='text/css'>

        <!--[if lt IE 9]>
        <script src="http://html5shim.googlecode.com/svn/trunk/html5.js" type="text/javascript"></script>
        <![endif]-->

    </head>
    <body>
        <div class="container">
            <h1>tic-tac-toe</h1>
            <div id='p1' class='pchoice'>
                Player 1
                <div class='choices'>
                    <button type='button' class='btn btn-default player selected'>Human</button>
                    <button type='button' class='btn btn-default player'>Easy</button>
                    <button type='button' class='btn btn-default player'>Medium</button>
                    <button type='button' class='btn btn-default player'>Hard</button>
                    <button type='button' class='btn btn-default player'>Impossible</button>
                </div>
            </div>

            <div id='p2' class='pchoice'>
                Player 2
                <div class='choices'>
                    <button type='button' class='btn btn-default player '>Human</button>
                    <button type='button' class='btn btn-default player'>Easy</button>
                    <button type='button' class='btn btn-default player selected'>Medium</button>
                    <button type='button' class='btn btn-default player'>Hard</button>
                    <button type='button' class='btn btn-default player'>Impossible</button>
                </div>
            </div>
            <div class='h-space'></div>
            <div>
                <button id='restart' type='button' class='btn btn-default'>
                    Restart
                </button>
            </div>
            <h3 id='status'></h3>
            <div class='h-space'></div>
            <div id='board'>
                <canvas id='tictacboard'></canvas>
            </div>
        </div>
    </body>

    <script src='tictactoe.js'></script>
    <script type="text/javascript">

     var _gaq = _gaq || [];
     _gaq.push(['_setAccount', 'UA-28171814-1']);
     _gaq.push(['_trackPageview']);

     (function() {
         var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
         ga.src = ('https:' == document.location.protocol ? 'https://ssl' : 'http://www') + '.google-analytics.com/ga.js';
         var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(ga, s);
     })();

    </script>

    <script type="text/javascript"/>
     window.onload = tictactoe.run;
    </script>
</html>
