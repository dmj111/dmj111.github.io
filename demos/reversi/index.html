<!DOCTYPE html>
<html lang="en" manifest="myapp.appcache">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="author" content="Dave Jones">

        <title>reversi</title>
        <link href="/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css">
        <link href="/assets/css/theme.css" rel="stylesheet" type="text/css">
        <link href="/assets/css/custom.css" rel="stylesheet" type="text/css">
        <link rel='stylesheet' href='reversi.css' type='text/css'>

        <!--[if lt IE 9]>
        <script src="http://html5shim.googlecode.com/svn/trunk/html5.js" type="text/javascript"></script>
        <![endif]-->

        <title>reversi</title>
        <script type="text/javascript"
                src="https://dl.dropboxusercontent.com/u/6197450/bayes_sgd.js">
        </script>
        <script type="text/javascript" src="reversi.js"></script>
        <script type="text/javascript" src="reversi_ui.js"></script>
    </head>

    <body>
        <div class="container">
            <h1>reversi</h1>
            <div id='status'>Waiting to play </div>
            <div id='boarddiv'> <canvas id='board'></canvas> </div>
            <div id='p1' class='pchoice'>
                Player 1
                <div class='choices'>
                    <button type='button' class='btn btn-default player selected'>Human</button>
                    <button type='button' class='btn btn-default player'>Level 1</button>
                    <button type='button' class='btn btn-default player'>Level 2</button>
                    <button type='button' class='btn btn-default player'>Level 3</button>
                    <button type='button' class='btn btn-default player'>Level 4</button>
                </div>

            </div>

            <div id='p2' class='pchoice'>
                Player 2
                <div class='choices'>
                    <button type='button' class='btn btn-default player '>Human</button>
                    <button type='button' class='btn btn-default player'>Level 1</button>
                    <button type='button' class='btn btn-default player selected'>Level 2</button>
                    <button type='button' class='btn btn-default player'>Level 3</button>
                    <button type='button' class='btn btn-default player'>Level 4</button>
                </div>
            </div>

            <div class='h-space'></div>

            <div class='h-space'></div>
            <div>
                <button id='start' type='button' class='btn btn-default'>
                    Start
                </button>
                <button id='stop' type='button' class='btn btn-default'>
                    Stop
                </button>

            </div>

        </div>
    </body>


    <script type="text/javascript">
     var _gaq = _gaq || [];
     _gaq.push(['_setAccount', 'UA-28171814-1']);
     _gaq.push(['_trackPageview']);

     (function() {
         var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
         ga.src = ('https:' == document.location.protocol ? 'https://ssl' : 'http://www') + '.google-analytics.com/ga.js';
         var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(ga, s);
     })();

    </script>
    <script>
     // Check if a new cache is available on page load.
     window.addEventListener('load', function(e) {

         window.applicationCache.addEventListener('updateready', function(e) {
             if (window.applicationCache.status == window.applicationCache.UPDATEREADY) {
                 // Browser downloaded a new app cache.
                 if (confirm('A new version of this site is available. Load it?')) {
                     window.location.reload();
                 }
             } else {
                 // Manifest didn't changed. Nothing new to server.
             }
         }, false);

     }, false);
    </script>
    </body>
</html>
